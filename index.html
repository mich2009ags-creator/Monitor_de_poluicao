<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Monitor de Poluição</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
    <!-- LOGO ANIMADA FOFA -->
    <div class="logo-container">
        <div class="logo" id="logoAnimada">
            <span class="leaf">🌿</span>
            <span class="heart">💚</span>
            <span class="cloud">☁️</span>
        </div>
        <h1>Monitor de Poluição</h1>
        <p>🌎 Cuidando do ar que você respira</p>
    </div>

    <!-- SELETOR DE CIDADES -->
    <div class="controles">
        <select id="cidadeSelect" onchange="trocarCidade()">
            <option value="-23.55,-46.63">🇧🇷 São Paulo</option>
            <option value="-22.91,-43.20">🇧🇷 Rio de Janeiro</option>
            <option value="-19.92,-43.94">🇧🇷 Belo Horizonte</option>
            <option value="-12.97,-38.51">🇧🇷 Salvador</option>
            <option value="-30.03,-51.23">🇧🇷 Porto Alegre</option>
            <option value="-25.43,-49.27">🇧🇷 Curitiba</option>
            <option value="-15.79,-47.88">🇧🇷 Brasília</option>
            <option value="-8.05,-34.90">🇧🇷 Recife</option>
            <option value="-3.72,-38.54">🇧🇷 Fortaleza</option>
            <option value="-27.60,-48.55">🇧🇷 Florianópolis</option>
        </select>
        <button id="temaBtn" onclick="alternarTema()">🌙</button>
    </div>
</header>

<main>
    <!-- Cidade atual -->
    <section class="card">
        <h2 id="nomeCidade">🇧🇷 São Paulo</h2>
        <div id="brasil" class="dado-principal">Carregando...</div>
        <div id="detalhes" class="detalhes"></div>
    </section>

    <!-- Mundo -->
    <section class="card">
        <h2>🌍 Visão Global</h2>
        <p id="mundo">Monitorando qualidade do ar</p>
    </section>

    <!-- Data -->
    <section class="card">
        <h2>📅 Última medição</h2>
        <p id="data" class="dado-principal">--</p>
    </section>

    <!-- Gráfico -->
    <section class="card">
        <h2>📊 Histórico (últimas horas)</h2>
        <canvas id="grafico"></canvas>
    </section>

    <!-- Mapa -->
    <section class="card">
        <h2>🗺️ Mapa da Poluição</h2>
        <div id="mapa"></div>
    </section>
</main>

<footer>
    <p>💚 Feito com carinho para um ar mais limpo</p>
</footer>

<script src="script.js"></script>
</body>
</html>
